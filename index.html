<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baho Qo'yish va Nazorat Tizimi 📊</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>O'quvchilarni Baholash Tizimi</h1>
            <p>O'quvchilar ballarini kiriting va umumiy statistikani kuzating</p>
        </header>

        <!-- Ma'lumot kiritish qismi -->
        <section class="form-section">
            <form id="grade-form">
                <div class="input-group">
                    <label for="student-name">O'quvchi ismi</label>
                    <input type="text" id="student-name" placeholder="Masalan: Ali Valiyev" required>
                </div>
                
                <div class="input-group">
                    <label for="subject-name">Fan nomi</label>
                    <input type="text" id="subject-name" placeholder="Masalan: Matematika" required>
                </div>

                <div class="input-group">
                    <label for="score">Ball (0 - 100)</label>
                    <input type="number" id="score" min="0" max="100" placeholder="Masalan: 85" required>
                </div>

                <button type="submit" class="submit-btn">Bahoni kiritish ➕</button>
            </form>
        </section>

        <!-- Statistika paneli -->
        <section class="stats-grid">
            <div class="stat-card">
                <h3>O'rtacha ball</h3>
                <p id="avg-score">0</p>
            </div>
            <div class="stat-card text-success">
                <h3>Eng yuqori ball</h3>
                <p id="max-score">0</p>
            </div>
            <div class="stat-card text-danger">
                <h3>Eng past ball</h3>
                <p id="min-score">0</p>
            </div>
        </section>

        <!-- Baholar jadvali -->
        <section class="table-section">
            <h2>Kiritilgan baholar ro'yxati</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>O'quvchi ismi</th>
                            <th>Fan</th>
                            <th>Ball</th>
                            <th>Baho</th>
                            <th>Amal</th>
                        </tr>
                    </thead>
                    <tbody id="grades-table-body">
                        <!-- Ma'lumotlar JS orqali qo'shiladi -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
